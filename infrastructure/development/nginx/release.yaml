apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
  namespace: nginx
spec:
  interval: 10m
  chart:
    spec:
      chart: nginx-ingress
      version: '2.6.x'
      sourceRef:
        kind: HelmRepository
        name: nginx
        namespace: nginx
      interval: 10m
  values:
    replicaCount: 2